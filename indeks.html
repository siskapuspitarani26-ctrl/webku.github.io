<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Siska Puspitarani</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: #f4f6f9;
    color: #333;
}

header {
    background: #007bff;
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
}

.hero {
    background: linear-gradient(to right, #4facfe, #00f2fe);
    color: white;
    padding: 80px 20px;
    text-align: center;
}

.hero img {
    width: 150px;
    border-radius: 50%;
    margin-top: 20px;
}

.section {
    padding: 60px 20px;
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
}

.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 20px;
    background: #007bff;
    color: white;
    border-radius: 5px;
    text-decoration: none;
}

footer {
    background: #222;
    color: white;
    padding: 20px;
    text-align: center;
}
</style>
</head>

<body>

<header>
    <nav>
        <a href="#">Home</a>
        <a href="#about">Tentang</a>
        <a href="#skill">Skill</a>
        <a href="#project">Project</a>
        <a href="#contact">Kontak</a>
    </nav>
</header>

<section class="hero">
    <h1>Halo, Saya <b>Siska Puspitarani</b></h1>
    <p>Fullstack Web Developer & UI/UX Designer</p>
    <img src="https://via.placeholder.com/150">
</section>

<section id="about" class="section">
    <h2>Tentang Saya</h2>
    <p>Saya adalah mahasiswa Teknik Informatika.</p>
</section>

<section id="skill" class="section">
    <h2>Keahlian</h2>
    <div class="grid">
        <div class="card">HTML & CSS</div>
        <div class="card">JavaScript</div>
        <div class="card">PHP</div>
        <div class="card">UI/UX</div>
    </div>
</section>

<section id="project" class="section">
    <h2>Project</h2>
    <div class="grid">
        <div class="card">Website Klinik</div>
        <div class="card">Portfolio</div>
        <div class="card">CRUD App</div>
    </div>
</section>

<section id="contact" class="section">
    <h2>Kontak</h2>
    <p>Email: siska@email.com</p>
</section>

<footer>
    <p>© 2026 Siska</p>
</footer>

</body>
</html>
